name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-exe:
    name: Build Windows .exe (PyInstaller)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Run tests
        run: pytest -q

      - name: Build single-file .exe
        run: pyinstaller ZebraLabelTool.spec --clean --noconfirm

      - name: Verify .exe exists
        run: |
          if (-not (Test-Path dist/ZebraLabelTool.exe)) { throw "Build artifact missing" }
          Get-Item dist/ZebraLabelTool.exe | Format-List Name, Length, LastWriteTime

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZebraLabelTool-windows-exe
          path: dist/ZebraLabelTool.exe
          if-no-files-found: error

      - name: Attach .exe to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ZebraLabelTool.exe
          generate_release_notes: true
          fail_on_unmatched_files: true

  tauri-msi:
    name: Build Tauri Windows installer
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Tauri bundle
        working-directory: desktop
        run: npm run tauri build

      - name: Collect Tauri artifacts
        id: collect
        shell: pwsh
        run: |
          $msi = Get-ChildItem desktop/src-tauri/target/release/bundle/msi/*.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          $nsis = Get-ChildItem desktop/src-tauri/target/release/bundle/nsis/*.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($msi) { "msi=$($msi.FullName)" | Out-File $env:GITHUB_OUTPUT -Append }
          if ($nsis) { "nsis=$($nsis.FullName)" | Out-File $env:GITHUB_OUTPUT -Append }

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ZebraLabelTool-tauri-windows
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Attach Tauri installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
          fail_on_unmatched_files: false
